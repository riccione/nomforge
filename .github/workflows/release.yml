name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CLI_BIN: nomforge-cli
  GUI_BIN: nomforge

jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - build: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win-x86_64
          - build: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - build: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies (GUI)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libgtk-3-dev \
          libatk1.0-dev \
          libgdk-pixbuf2.0-dev \
          libpango1.0-dev \
          libcairo2-dev

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --locked

    - name: Strip symbols
      if: matrix.os != 'windows-latest'
      run: |
        strip target/${{ matrix.target }}/release/${{ env.CLI_BIN }}
        strip target/${{ matrix.target }}/release/${{ env.GUI_BIN }}

    - name: Run UPX
      if: matrix.os == 'ubuntu-latest'
      uses: crazy-max/ghaction-upx@v3
      with:
        version: latest
        files: |
          target/${{ matrix.target }}/release/${{ env.CLI_BIN }}
          target/${{ matrix.target }}/release/${{ env.GUI_BIN }}
        args: --best --lzma

    - name: Generate Changelog
      id: changelog
      if: matrix.os == 'ubuntu-latest'
      continue-on-error: true
      uses: jaywcjlove/changelog-generator@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload CLI to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: target/${{ matrix.target }}/release/${{ env.CLI_BIN }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        asset_name: ${{ env.CLI_BIN }}_${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        tag: ${{ github.ref_name }}
        overwrite: true
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        body: ${{ matrix.os == 'ubuntu-latest' && steps.changelog.outputs.changelog || '' }}

    - name: Upload GUI to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: target/${{ matrix.target }}/release/${{ env.GUI_BIN }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        asset_name: ${{ env.GUI_BIN }}_${{ matrix.platform }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        tag: ${{ github.ref_name }}
        overwrite: true
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
